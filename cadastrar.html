<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="cadastrar.js"></script>
<link rel="stylesheet" href="cadastrar.css">
</head>
<body>
<div class="card-cadastro">

  <div class="card-body">
    <h2 class="card-title">Entre para a nossa comunidade!</h2>
    <!-- <p class="card-subtitle">Complete seus dados em 1 minuto</p> -->

    <div class="divider"></div>

    <form action="cadastrar.php" method="POST">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Primeiro nome</label>
          <input class="form-control" name="nome" placeholder="João">
        </div>
        <div class="col-md-6">
          <label class="form-label">Sobrenome</label>
          <input class="form-control" name="sobrenome" placeholder="Silva">
        </div>
      </div>
      
      <div class="mb-4">
        <label class="form-label">Nome de usuário</label>
        <input class="form-control" name="usuario" placeholder="@joaosilva">
      </div>
      
      <div class="mb-4">
        <label class="form-label">Data de nascimento</label>
        <input class="form-control" name="datanasc" type="date">
      </div>
      
      <div class="mb-4">
        <label class="form-label">E-mail</label>
        <input class="form-control"  name="email" placeholder="joao@email.com" type="email">
      </div>

      <div class="mb-4">
        <label class="form-label">Numero de telefone</label>
        <input class="form-control" name="telefone" placeholder="(99) 9999-99999" type="tel" maxlength="15">
      </div>
      
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <input class="form-control" name="senha" type="password" placeholder="••••••••" minlength="6">
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3" id="btnCadastrar" disabled>
        <i class="fas fa-user-plus me-2"></i>Preencha todos os campos
      </button>
      <a href="login.html" class="btn btn-outline-secondary w-100">Já tem conta? Entrar</a>
    </form>
  </div>
</div>



</body>
</html>
